<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2360a5fa'/%3E%3Cstop offset='100%25' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='%230a0e17'/%3E%3Ccircle cx='32' cy='32' r='28' fill='none' stroke='url(%23g)' stroke-width='2' opacity='0.4'/%3E%3Cpath d='M22 42L42 22' stroke='%2360a5fa' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='20' cy='44' r='4' fill='%2334d399' opacity='0.9'/%3E%3Ccircle cx='32' cy='32' r='3.5' fill='%238b5cf6' opacity='0.9'/%3E%3Ccircle cx='44' cy='20' r='4' fill='%23f59e0b' opacity='0.9'/%3E%3Ccircle cx='26' cy='26' r='2' fill='%2360a5fa' opacity='0.6'/%3E%3Ccircle cx='38' cy='38' r='2' fill='%2360a5fa' opacity='0.6'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Protocol Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e17; }
  #root { min-height: 100vh; }
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

const COLORS = {
  bg: "#0a0e17",
  card: "#111827",
  cardHover: "#1a2236",
  border: "#1e293b",
  borderAccent: "#334155",
  text: "#e2e8f0",
  textMuted: "#94a3b8",
  textDim: "#64748b",
  // Time-of-day colors
  morning: { primary: "#f59e0b", bg: "rgba(245,158,11,0.08)", border: "rgba(245,158,11,0.25)", glow: "rgba(245,158,11,0.15)" },
  midday: { primary: "#06b6d4", bg: "rgba(6,182,212,0.08)", border: "rgba(6,182,212,0.25)", glow: "rgba(6,182,212,0.15)" },
  evening: { primary: "#8b5cf6", bg: "rgba(139,92,246,0.08)", border: "rgba(139,92,246,0.25)", glow: "rgba(139,92,246,0.15)" },
  bedtime: { primary: "#3b82f6", bg: "rgba(59,130,246,0.08)", border: "rgba(59,130,246,0.25)", glow: "rgba(59,130,246,0.15)" },
  fasting: { primary: "#ef4444", bg: "rgba(239,68,68,0.06)", border: "rgba(239,68,68,0.2)", glow: "rgba(239,68,68,0.1)" },
  // Category tags
  ghSecretagogue: "#f59e0b",
  sleep: "#818cf8",
  tissue: "#34d399",
  cognition: "#f472b6",
  energy: "#fb923c",
  gut: "#a78bfa",
  redox: "#22d3ee",
  hormone: "#fbbf24",
  immune: "#6ee7b7",
  longevity: "#c084fc",
};

const Tag = ({ label, color }) => (
  <span style={{
    display: "inline-block",
    padding: "2px 8px",
    borderRadius: "4px",
    fontSize: "12px",
    fontWeight: 600,
    letterSpacing: "0.5px",
    textTransform: "uppercase",
    color: color,
    background: color + "18",
    border: `1px solid ${color}40`,
    marginRight: "4px",
    marginBottom: "3px",
    whiteSpace: "nowrap",
  }}>{label}</span>
);

const RouteTag = ({ route }) => {
  const routeColors = {
    "subQ": "#60a5fa",
    "Oral": "#a78bfa",
    "Nasal": "#34d399",
    "Topical": "#fbbf24",
  };
  return (
    <span style={{
      display: "inline-block",
      padding: "2px 6px",
      borderRadius: "3px",
      fontSize: "11px",
      fontWeight: 700,
      letterSpacing: "0.8px",
      textTransform: "uppercase",
      color: routeColors[route] || "#94a3b8",
      background: (routeColors[route] || "#94a3b8") + "15",
      marginLeft: "6px",
    }}>{route}</span>
  );
};

const ItemCard = ({ name, route, dose, frequency, notes, tags, constraint, isPeptide }) => (
  <div style={{
    background: isPeptide ? "rgba(59,130,246,0.04)" : "rgba(139,92,246,0.04)",
    border: `1px solid ${isPeptide ? "rgba(59,130,246,0.12)" : "rgba(139,92,246,0.12)"}`,
    borderRadius: "8px",
    padding: "10px 12px",
    marginBottom: "6px",
    transition: "all 0.2s ease",
  }}>
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "4px", flexWrap: "wrap", gap: "2px" }}>
      <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap" }}>
        <span style={{
          width: "6px", height: "6px", borderRadius: "50%",
          background: isPeptide ? "#3b82f6" : "#8b5cf6",
          marginRight: "8px", flexShrink: 0,
        }} />
        <span style={{ fontWeight: 700, fontSize: "15px", color: COLORS.text, fontFamily: "'DM Sans', sans-serif" }}>{name}</span>
        {route && <RouteTag route={route} />}
      </div>
      {dose && <span style={{ fontSize: "13px", color: COLORS.textMuted, fontFamily: "'JetBrains Mono', monospace", fontWeight: 500 }}>{dose}</span>}
    </div>
    {frequency && (
      <div style={{ fontSize: "13px", color: COLORS.textDim, marginLeft: "14px", marginBottom: "3px", fontStyle: "italic" }}>
        {frequency}
      </div>
    )}
    {notes && (
      <div style={{ fontSize: "13px", color: COLORS.textMuted, marginLeft: "14px", lineHeight: 1.5, marginBottom: tags ? "6px" : "0" }}>
        {notes}
      </div>
    )}
    {constraint && (
      <div style={{
        fontSize: "12px", color: "#f59e0b", marginLeft: "14px", marginTop: "4px",
        padding: "3px 8px", background: "rgba(245,158,11,0.08)", borderRadius: "4px",
        border: "1px solid rgba(245,158,11,0.15)", display: "inline-block",
      }}>
        ⚠ {constraint}
      </div>
    )}
    {tags && tags.length > 0 && (
      <div style={{ marginLeft: "14px", marginTop: "4px", display: "flex", flexWrap: "wrap" }}>
        {tags.map((t, i) => <Tag key={i} label={t.label} color={t.color} />)}
      </div>
    )}
  </div>
);

const TimeBlock = ({ icon, time, title, subtitle, color, children, isSpecial }) => (
  <div style={{
    marginBottom: "20px",
    position: "relative",
  }}>
    <div style={{
      background: isSpecial ? color.bg : COLORS.card,
      border: `1px solid ${isSpecial ? color.border : COLORS.border}`,
      borderRadius: "12px",
      overflow: "hidden",
      boxShadow: isSpecial ? `0 0 30px ${color.glow}` : "0 2px 8px rgba(0,0,0,0.3)",
    }}>
      {/* Header */}
      <div style={{
        padding: "14px 16px 10px",
        borderBottom: `1px solid ${isSpecial ? color.border : COLORS.border}`,
        background: color.bg,
        display: "flex",
        alignItems: "center",
        gap: "10px",
      }}>
        <span style={{ fontSize: "23px" }}>{icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: "8px", flexWrap: "wrap" }}>
            <span style={{
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: "14px", fontWeight: 700, color: color.primary,
              letterSpacing: "0.5px",
            }}>{time}</span>
            <span style={{
              fontFamily: "'DM Sans', sans-serif",
              fontSize: "17px", fontWeight: 800, color: COLORS.text,
              letterSpacing: "-0.3px",
            }}>{title}</span>
          </div>
          {subtitle && (
            <div style={{ fontSize: "13px", color: COLORS.textDim, marginTop: "2px", lineHeight: 1.4 }}>{subtitle}</div>
          )}
        </div>
      </div>
      {/* Content */}
      <div style={{ padding: "12px 14px" }}>
        {children}
      </div>
    </div>
  </div>
);

const SynergyNote = ({ text, color }) => (
  <div style={{
    margin: "8px 0 4px",
    padding: "8px 12px",
    background: "rgba(52,211,153,0.06)",
    border: "1px solid rgba(52,211,153,0.15)",
    borderRadius: "6px",
    fontSize: "13px",
    color: "#6ee7b7",
    lineHeight: 1.5,
    display: "flex",
    gap: "6px",
  }}>
    <span style={{ flexShrink: 0 }}>🔗</span>
    <span>{text}</span>
  </div>
);

const SectionDivider = ({ label }) => (
  <div style={{
    display: "flex", alignItems: "center", gap: "12px",
    margin: "28px 0 18px", padding: "0 4px",
  }}>
    <div style={{ flex: 1, height: "1px", background: "linear-gradient(90deg, transparent, #334155, transparent)" }} />
    <span style={{
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: "12px", fontWeight: 700, color: COLORS.textDim,
      letterSpacing: "2px", textTransform: "uppercase",
    }}>{label}</span>
    <div style={{ flex: 1, height: "1px", background: "linear-gradient(90deg, transparent, #334155, transparent)" }} />
  </div>
);

function ProtocolInfographic() {
  const [mode, setMode] = useState("full"); // "peptides" or "full"

  const isPeptides = mode === "peptides";

  return (
    <div style={{
      minHeight: "100vh",
      background: COLORS.bg,
      color: COLORS.text,
      fontFamily: "'DM Sans', sans-serif",
      padding: "0",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{
        padding: "32px 20px 20px",
        textAlign: "center",
        borderBottom: `1px solid ${COLORS.border}`,
        background: "linear-gradient(180deg, rgba(59,130,246,0.06) 0%, transparent 100%)",
      }}>
        <div style={{
          fontFamily: "'JetBrains Mono', monospace",
          fontSize: "12px", fontWeight: 700, color: COLORS.textDim,
          letterSpacing: "3px", textTransform: "uppercase", marginBottom: "8px",
        }}>Daily Protocol Architecture</div>
        <h1 style={{
          fontSize: "30px", fontWeight: 800, margin: "0 0 6px",
          letterSpacing: "-0.5px",
          background: "linear-gradient(135deg, #e2e8f0, #94a3b8)",
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
        }}>
          {isPeptides ? "Peptide Protocol" : "Full Stack Protocol"}
        </h1>
        <div style={{ fontSize: "14px", color: COLORS.textDim, marginBottom: "20px" }}>
          {isPeptides ? "Peptides & Timing — Standalone Reference" : "Peptides + Supplement Stack — Integrated Protocol"}
        </div>

        {/* Toggle */}
        <div style={{
          display: "inline-flex",
          background: COLORS.card,
          borderRadius: "8px",
          border: `1px solid ${COLORS.border}`,
          padding: "3px",
          gap: "2px",
        }}>
          {[
            { key: "peptides", label: "Peptides Only" },
            { key: "full", label: "Full Stack" },
          ].map(opt => (
            <button
              key={opt.key}
              onClick={() => setMode(opt.key)}
              style={{
                padding: "8px 20px",
                borderRadius: "6px",
                border: "none",
                cursor: "pointer",
                fontSize: "14px",
                fontWeight: 700,
                fontFamily: "'DM Sans', sans-serif",
                letterSpacing: "0.3px",
                transition: "all 0.2s ease",
                background: mode === opt.key ? "rgba(59,130,246,0.2)" : "transparent",
                color: mode === opt.key ? "#60a5fa" : COLORS.textDim,
              }}
            >{opt.label}</button>
          ))}
        </div>
      </div>

      {/* Legend */}
      <div style={{
        padding: "14px 20px",
        borderBottom: `1px solid ${COLORS.border}`,
        display: "flex",
        flexWrap: "wrap",
        gap: "6px",
        justifyContent: "center",
      }}>
        <Tag label="GH / Secretagogue" color={COLORS.ghSecretagogue} />
        <Tag label="Sleep" color={COLORS.sleep} />
        <Tag label="Tissue / Collagen" color={COLORS.tissue} />
        <Tag label="Cognition" color={COLORS.cognition} />
        <Tag label="Energy / Mito" color={COLORS.energy} />
        <Tag label="Gut" color={COLORS.gut} />
        {!isPeptides && <>
          <Tag label="Redox" color={COLORS.redox} />
          <Tag label="Hormone" color={COLORS.hormone} />
          <Tag label="Longevity" color={COLORS.longevity} />
        </>}
      </div>

      {/* Main Content */}
      <div style={{ maxWidth: "880px", margin: "0 auto", padding: "20px 16px 40px" }}>

        {/* ====== MORNING ====== */}
        <TimeBlock
          icon="☀️"
          time="7:00 – 8:00 AM"
          title="Morning Protocol"
          subtitle="Circadian anchor → neuro priming → injection block → orals"
          color={COLORS.morning}
        >
          <div style={{
            fontSize: "13px", color: COLORS.morning.primary, fontWeight: 600,
            marginBottom: "8px", letterSpacing: "0.3px",
          }}>
            STEP 1 — First 10 min after waking
          </div>
          <ItemCard
            name="Morning Sunlight" route={null} dose="10+ min"
            notes="Anchor circadian clock. Direct retinal exposure, no sunglasses."
            isPeptide={false}
          />
          <ItemCard
            name="Semax / Selank" route="Nasal" dose="2 sprays"
            frequency="Daily"
            notes="Dopaminergic CNS priming. Do before injections."
            tags={[{ label: "Cognition", color: COLORS.cognition }]}
            isPeptide={true}
          />

          <div style={{
            fontSize: "13px", color: COLORS.morning.primary, fontWeight: 600,
            margin: "12px 0 8px", letterSpacing: "0.3px",
          }}>
            STEP 2 — Injection Block (~15–20 min after waking)
          </div>
          <ItemCard
            name="GHK-Cu" route="subQ" dose="1–2 mg"
            frequency="Daily or every other day"
            notes="Systemic tissue remodeling, collagen I/III, SOD upregulation. Rotate injection sites."
            tags={[
              { label: "Tissue / Collagen", color: COLORS.tissue },
              { label: "Longevity", color: COLORS.longevity },
            ]}
            isPeptide={true}
          />
          <ItemCard
            name="BPC-157" route="subQ" dose="250–500 mcg"
            frequency="Daily"
            notes="Systemic musculoskeletal repair. Replaces AM oral dose — evening oral dose retained for gut."
            tags={[{ label: "Tissue / Collagen", color: COLORS.tissue }]}
            isPeptide={true}
          />
          <ItemCard
            name="TB-500" route="subQ" dose="2–2.5 mg"
            frequency="2× / week (e.g. Mon + Thu)"
            notes="Actin upregulation, cellular migration for tissue repair. Long half-life — 3-4 day spacing."
            tags={[{ label: "Tissue / Collagen", color: COLORS.tissue }]}
            isPeptide={true}
          />

          <SynergyNote text="BPC-157 builds local vascular infrastructure. TB-500 mobilizes repair cells systemically. GHK-Cu drives the remodeling blueprint. Three layers on one repair axis." />

          {!isPeptides && (
            <>
              <div style={{
                fontSize: "13px", color: COLORS.morning.primary, fontWeight: 600,
                margin: "12px 0 8px", letterSpacing: "0.3px",
              }}>
                STEP 3 — Oral Stack (with breakfast)
              </div>
              <ItemCard name="Lion's Mane" route="Oral" dose="1,000 mg (2 caps)" frequency="Daily"
                notes="BDNF upregulation, neurogenesis support."
                tags={[{ label: "Cognition", color: COLORS.cognition }]} isPeptide={false} />
              <ItemCard name="Cordyceps" route="Oral" dose="1,000 mg (2 caps)" frequency="Daily"
                notes="Non-stimulant cellular ATP production."
                tags={[{ label: "Energy / Mito", color: COLORS.energy }]} isPeptide={false} />
              <ItemCard name="NAC" route="Oral" dose="1,000 mg" frequency="Daily"
                notes="Glutathione precursor. First node in the Glutathione Pipeline."
                tags={[{ label: "Redox", color: COLORS.redox }]} isPeptide={false} />
              <ItemCard name="Liposomal Vitamin C" route="Oral" dose="1,000 mg" frequency="Daily"
                tags={[{ label: "Redox", color: COLORS.redox }]} isPeptide={false} />
              <ItemCard name="Aspirin" route="Oral" dose="81 mg" frequency="Daily"
                isPeptide={false} />
              <ItemCard name="Magnesium" route="Oral" dose="250 mg" frequency="Daily"
                tags={[{ label: "Hormone", color: COLORS.hormone }]} isPeptide={false} />
              <ItemCard name="Taurine" route="Oral" dose="1,000 mg" frequency="Daily"
                isPeptide={false} />
              <ItemCard name="Masszymes" route="Oral" dose="3 caps" frequency="Daily (with food)"
                tags={[{ label: "Gut", color: COLORS.gut }]} isPeptide={false} />
            </>
          )}
        </TimeBlock>

        {/* ====== NAD+ BLOCK ====== */}
        <TimeBlock
          icon="⚡"
          time="~ 9:00 AM"
          title="NAD+ Injection"
          subtitle="2× per week — ideally fasting Tuesday + recovery Friday"
          color={COLORS.morning}
        >
          <ItemCard
            name="NAD+" route="subQ" dose="200 mg per dose"
            frequency="2× / week (e.g. Tue + Fri AM)"
            notes="Sirtuin cofactor, ETC support, DNA repair. Morning dosing only — energizing effect. Start subQ to manage histamine risk."
            constraint="Monitor for histamine flush — dose in AM when DAO enzyme is peak"
            tags={[
              { label: "Energy / Mito", color: COLORS.energy },
              { label: "Cognition", color: COLORS.cognition },
              { label: "Longevity", color: COLORS.longevity },
            ]}
            isPeptide={true}
          />
          <SynergyNote text="Tuesday AM during 36-hr fast is the highest-leverage window — fasting activates SIRT1/SIRT3, NAD+ provides the substrate they need to function." />
        </TimeBlock>

        {/* ====== MIDDAY ====== */}
        {!isPeptides && (
          <TimeBlock
            icon="🌤️"
            time="12:00 – 1:00 PM"
            title="Midday Protocol"
            subtitle="Maintenance, hormone support & fat-soluble vitamins with lunch"
            color={COLORS.midday}
          >
            <ItemCard name="Vitamin D3" route="Oral" dose="10,000 IU" frequency="Daily (with fat-containing meal)"
              notes="Fat-soluble — must take with dietary fat for absorption."
              tags={[{ label: "Hormone", color: COLORS.hormone }]} isPeptide={false} />
            <ItemCard name="Vitamin K2 MK-4" route="Oral" dose="45 mg" frequency="Daily"
              notes="Directs calcium to bone, away from arteries. Paired with D3."
              tags={[{ label: "Hormone", color: COLORS.hormone }]} isPeptide={false} />
            <ItemCard name="NAC" route="Oral" dose="2,000 mg" frequency="Daily"
              tags={[{ label: "Redox", color: COLORS.redox }]} isPeptide={false} />
            <ItemCard name="Liposomal Vitamin C" route="Oral" dose="1,000 mg" frequency="Daily"
              tags={[{ label: "Redox", color: COLORS.redox }]} isPeptide={false} />
            <ItemCard name="Aspirin" route="Oral" dose="81 mg" frequency="Daily"
              isPeptide={false} />
            <ItemCard name="Taurine" route="Oral" dose="2,000 mg" frequency="Daily"
              isPeptide={false} />
            <ItemCard name="Masszymes" route="Oral" dose="3 caps" frequency="Daily (with food)"
              tags={[{ label: "Gut", color: COLORS.gut }]} isPeptide={false} />

            <SynergyNote text="Calcium Direction System: D3 → K2 → Magnesium → Boron — ensures calcium deposits in bone, not arterial walls." />
          </TimeBlock>
        )}

        {/* ====== LAST MEAL ====== */}
        <SectionDivider label="Evening Transition" />

        <TimeBlock
          icon="🍽️"
          time="9:30 – 10:00 PM"
          title="Last Meal Cutoff"
          subtitle="Hard stop — insulin must clear before bedtime peptide window"
          color={COLORS.evening}
          isSpecial={true}
        >
          <div style={{
            padding: "10px 12px", borderRadius: "8px",
            background: "rgba(245,158,11,0.06)", border: "1px solid rgba(245,158,11,0.12)",
            fontSize: "14px", color: COLORS.textMuted, lineHeight: 1.6,
          }}>
            <strong style={{ color: "#f59e0b" }}>Critical constraint:</strong> CJC/Ipamorelin requires a fasted state — any insulin spike blunts the GH pulse. Lean protein + moderate carbs is ideal for the final meal. The 90–120 min gap before injection is measured from <em>food</em>, not supplements.
          </div>
        </TimeBlock>

        {/* ====== BEDTIME INJECTIONS ====== */}
        <TimeBlock
          icon="💉"
          time="11:15 – 11:30 PM"
          title="Bedtime Peptide Injections"
          subtitle="The GH amplification window — 90+ min post-meal, fasted"
          color={COLORS.bedtime}
          isSpecial={true}
        >
          <ItemCard
            name="CJC-1295 / Ipamorelin" route="subQ" dose="Per protocol"
            frequency="Daily — nightly before bed"
            notes="GH secretagogue combo. Primes pituitary for amplified GH pulse during first slow-wave sleep cycle (60–90 min after sleep onset). Abdominal subQ."
            constraint="Must be fasted 90-120 min — insulin blunts GH release"
            tags={[
              { label: "GH / Secretagogue", color: COLORS.ghSecretagogue },
              { label: "Tissue / Collagen", color: COLORS.tissue },
              { label: "Sleep", color: COLORS.sleep },
            ]}
            isPeptide={true}
          />
          <ItemCard
            name="DSIP" route="subQ" dose="100–200 mcg"
            frequency="Daily — same injection window"
            notes="Deepens and extends delta-wave (Stage 3/4) sleep architecture. Normalizes disrupted cortisol rhythms. No morning grogginess."
            tags={[
              { label: "Sleep", color: COLORS.sleep },
            ]}
            isPeptide={true}
          />
          <SynergyNote text="DSIP extends the delta-wave window → CJC/Ipa amplifies the GH pulse that rides on it → Sleep Cascade (next step) drops core temp to initiate the cycle. Three mechanisms converging on one 2-hour window." />
        </TimeBlock>

        {/* ====== SLEEP CASCADE ====== */}
        <TimeBlock
          icon="🌙"
          time="11:30 – 11:45 PM"
          title={isPeptides ? "Pre-Sleep Orals" : "Sleep Cascade + Evening Stack"}
          subtitle="Oral protocol after injections, before lights out"
          color={COLORS.bedtime}
        >
          {isPeptides ? (
            <>
              <ItemCard
                name="BPC-157" route="Oral" dose="1 capsule"
                frequency="Daily"
                notes="Retained as evening oral dose for gut-specific mucosal maintenance. Direct GI contact provides localized repair advantage over injectable."
                tags={[{ label: "Gut", color: COLORS.gut }, { label: "Tissue / Collagen", color: COLORS.tissue }]}
                isPeptide={true}
              />
              <div style={{
